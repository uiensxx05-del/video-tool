<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AI爆款视频诊断大师</title>
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1677FF',
            secondary: '#FF4D4F',
            success: '#52C41A',
            warning: '#FAAD14',
          }
        }
      }
    }
  </script>
  <style>
    /* 自定义样式 */
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    }
    .upload-area {
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #1677FF;
      background-color: rgba(22,119,255,0.05);
    }
    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fa fa-video-camera text-primary text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800">AI爆款诊断大师</h1>
      </div>
      <div id="activation-status" class="text-sm text-gray-600"></div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-8">
    <!-- 激活码区域 -->
    <div id="activationBox" class="bg-white rounded-xl shadow-md p-6 mb-8">
      <div class="flex flex-col md:flex-row gap-4 items-end">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">激活码</label>
          <input type="text" id="activationCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary" placeholder="输入激活码">
        </div>
        <button id="activateBtn" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-opacity-90 transition">激活设备</button>
      </div>
      <p class="text-xs text-gray-500 mt-2">每个激活码仅限一台设备永久使用，激活后本机将自动记住。</p>
    </div>

    <!-- 视频信息上传区（激活后显示） -->
    <div id="uploadSection" class="hidden">
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">上传视频分析</h2>
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 视频文件上传 -->
            <div class="space-y-2">
              <label class="block text-sm font-medium text-gray-700">视频文件</label>
              <div class="upload-area border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer" id="uploadArea">
                <input type="file" id="videoFile" class="hidden" accept="video/mp4,video/quicktime">
                <i class="fa fa-cloud-upload text-4xl text-gray-400 mb-2"></i>
                <p class="text-gray-500">点击或拖拽视频文件到此处</p>
                <p class="text-xs text-gray-400 mt-1">支持 MP4、MOV 格式，最大 500MB</p>
                <div id="fileInfo" class="mt-4 hidden">
                  <div class="flex items-center justify-between bg-gray-100 p-2 rounded">
                    <span id="fileName" class="text-sm truncate"></span>
                    <span id="fileSize" class="text-xs text-gray-500"></span>
                  </div>
                </div>
              </div>
            </div>
            <!-- 标题输入 -->
            <div class="space-y-2">
              <label for="videoTitle" class="block text-sm font-medium text-gray-700">视频标题</label>
              <input type="text" id="videoTitle" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary" placeholder="请输入视频标题（最多50字）" maxlength="50">
              <div class="flex justify-between text-xs text-gray-400">
                <span id="titleError" class="text-secondary hidden">标题不能为空</span>
                <span id="titleCount">0/50</span>
              </div>
            </div>
          </div>
          <div class="space-y-2">
            <label for="videoCaption" class="block text-sm font-medium text-gray-700">视频文案/描述</label>
            <textarea id="videoCaption" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary" placeholder="输入视频的文案或描述..."></textarea>
          </div>
          <div class="space-y-2">
            <label for="videoCategory" class="block text-sm font-medium text-gray-700">视频领域</label>
            <select id="videoCategory" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
              <option value="生活记录">生活记录 / Vlog</option>
              <option value="知识科普">知识科普 / 教程</option>
              <option value="搞笑剧情">搞笑 / 剧情</option>
              <option value="美食展示">美食展示</option>
              <option value="才艺表演">才艺表演</option>
              <option value="美妆穿搭">美妆 / 穿搭</option>
              <option value="萌宠日常">萌宠日常</option>
              <option value="风景旅行">风景旅行</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="flex justify-center">
            <button id="analyzeBtn" class="bg-primary text-white px-8 py-2 rounded-lg hover:bg-opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>🤖 开始AI深度分析</button>
          </div>
        </div>
      </div>

      <!-- 分析结果展示区 -->
      <div id="analysisSection" class="hidden">
        <!-- 流量潜力评分 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">流量潜力评分</h2>
            <div class="flex items-center space-x-2 mt-2 md:mt-0">
              <div class="text-3xl font-bold text-primary" id="totalScore">--</div>
              <div class="text-sm text-gray-500">/ 100</div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1">
              <div class="aspect-square max-w-xs mx-auto">
                <canvas id="radarChart"></canvas>
              </div>
            </div>
            <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div><div class="w-3 h-3 rounded-full bg-primary inline-block mr-2"></div>内容吸引力</div>
              <div><div class="w-3 h-3 rounded-full bg-info inline-block mr-2"></div>标题热度</div>
              <div><div class="w-3 h-3 rounded-full bg-success inline-block mr-2"></div>画面质量</div>
              <div><div class="w-3 h-3 rounded-full bg-warning inline-block mr-2"></div>合规性</div>
              <div><div class="w-3 h-3 rounded-full bg-secondary inline-block mr-2"></div>互动性</div>
              <div><div class="w-3 h-3 rounded-full bg-purple-500 inline-block mr-2"></div>节奏感</div>
            </div>
          </div>
        </div>

        <!-- 违规检测结果 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
          <h2 class="text-2xl font-bold mb-4 text-gray-800">违规检测结果</h2>
          <div id="violationNone" class="flex items-center space-x-3 text-success">
            <i class="fa fa-check-circle text-xl"></i>
            <span>未检测到违规内容，视频符合平台规范</span>
          </div>
          <div id="violationExist" class="hidden text-secondary">
            <i class="fa fa-exclamation-circle text-xl mr-2"></i>
            <span>检测到潜在违规内容，请参考建议修改</span>
          </div>
        </div>

        <!-- 问题分析 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-800">问题分析</h2>
            <button id="toggleProblems" class="text-primary text-sm flex items-center space-x-1">
              <span>收起</span>
              <i class="fa fa-chevron-up"></i>
            </button>
          </div>
          <div id="problemsContent" class="space-y-4"></div>
        </div>

        <!-- 优化建议 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-800">优化建议</h2>
            <button id="toggleSuggestions" class="text-primary text-sm flex items-center space-x-1">
              <span>收起</span>
              <i class="fa fa-chevron-up"></i>
            </button>
          </div>
          <div id="suggestionsContent" class="space-y-4"></div>
          <div class="mt-6 flex justify-center">
            <button id="copyResults" class="border border-primary text-primary px-6 py-2 rounded-lg hover:bg-primary hover:text-white transition">📋 复制分析结果</button>
          </div>
        </div>
      </div>

      <!-- 视频模板推荐区（保留原豆包静态模板） -->
      <div id="templatesSection" class="mb-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">优质视频模板</h2>
          <div class="flex space-x-2">
            <button class="template-filter active px-3 py-1 rounded-full text-sm bg-primary text-white">全部</button>
            <button class="template-filter px-3 py-1 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-primary hover:text-white transition-colors">美食</button>
            <button class="template-filter px-3 py-1 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-primary hover:text-white transition-colors">生活</button>
            <button class="template-filter px-3 py-1 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-primary hover:text-white transition-colors">美妆</button>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="templateContainer">
          <!-- 模板将通过JS动态生成，保持原样 -->
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-white py-8 mt-8">
    <div class="container mx-auto px-4 text-center text-gray-400 text-sm">
      <p>© 2025 AI爆款诊断大师 | 基于通义千问多模态AI | 激活码绑定设备，永久使用</p>
    </div>
  </footer>

  <!-- 加载弹窗 -->
  <div id="loadingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 w-full max-w-md text-center">
      <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-primary mx-auto mb-4"></div>
      <h3 class="text-lg font-bold mb-2">AI正在深度分析</h3>
      <p class="text-sm text-gray-500">请稍候，AI正在分析视频画面和内容...</p>
    </div>
  </div>

  <script>
    // 后端地址
    const BACKEND_URL = 'http://localhost:3000';
    let activeToken = null;
    let videoFile = null;
    let videoInfo = {};
    let frames = []; // 存储三帧 base64
    let radarChart = null;

    // 生成设备唯一ID
    function getDeviceId() {
      let id = localStorage.getItem('device_id');
      if (!id) {
        id = 'device_' + Math.random().toString(36).substr(2, 16) + Date.now();
        localStorage.setItem('device_id', id);
      }
      return id;
    }

    // 激活码激活
    document.getElementById('activateBtn').onclick = async () => {
      const code = document.getElementById('activationCode').value.trim().toUpperCase();
      if (!code) { alert('请输入激活码'); return; }
      const btn = document.getElementById('activateBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> 验证中...';
      try {
        const res = await fetch(`${BACKEND_URL}/api/activate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, deviceId: getDeviceId() })
        });
        const data = await res.json();
        if (data.success) {
          activeToken = data.token;
          localStorage.setItem('active_token', activeToken);
          document.getElementById('activationBox').style.display = 'none';
          document.getElementById('uploadSection').classList.remove('hidden');
          document.getElementById('activation-status').innerHTML = '✅ 已激活';
          alert('激活成功！本设备已绑定，可永久使用');
        } else {
          alert(data.message);
        }
      } catch (err) {
        alert('连接后端失败，请确保后端已启动');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '激活设备';
      }
    };

    // 检查是否已激活（页面加载时）
    (function checkActivation() {
      const savedToken = localStorage.getItem('active_token');
      if (savedToken) {
        activeToken = savedToken;
        document.getElementById('activationBox').style.display = 'none';
        document.getElementById('uploadSection').classList.remove('hidden');
        document.getElementById('activation-status').innerHTML = '✅ 已激活';
      }
    })();

    // 上传视频处理
    const videoInput = document.getElementById('videoFile');
    const uploadArea = document.getElementById('uploadArea');
    const fileInfoDiv = document.getElementById('fileInfo');
    const fileNameSpan = document.getElementById('fileName');
    const fileSizeSpan = document.getElementById('fileSize');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const titleInput = document.getElementById('videoTitle');
    const titleCountSpan = document.getElementById('titleCount');
    const titleErrorSpan = document.getElementById('titleError');

    uploadArea.addEventListener('click', () => videoInput.click());
    uploadArea.addEventListener('dragover', (e) => e.preventDefault());
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) handleVideoFile(file);
    });
    videoInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleVideoFile(e.target.files[0]);
    });

    titleInput.addEventListener('input', () => {
      const len = titleInput.value.length;
      titleCountSpan.innerText = `${len}/50`;
      if (len === 0) titleErrorSpan.classList.remove('hidden');
      else titleErrorSpan.classList.add('hidden');
      validateForm();
    });

    function validateForm() {
      const hasFile = !!videoFile;
      const hasTitle = titleInput.value.trim().length > 0;
      analyzeBtn.disabled = !(hasFile && hasTitle);
    }

    async function handleVideoFile(file) {
      videoFile = file;
      const url = URL.createObjectURL(file);
      const video = document.createElement('video');
      video.src = url;
      video.onloadedmetadata = async () => {
        videoInfo = {
          duration: Math.floor(video.duration),
          width: video.videoWidth,
          height: video.videoHeight,
          sizeMB: (file.size / 1024 / 1024).toFixed(2),
          name: file.name
        };
        fileNameSpan.innerText = file.name;
        fileSizeSpan.innerText = videoInfo.sizeMB + ' MB';
        fileInfoDiv.classList.remove('hidden');
        await extractFrames(video);
        validateForm();
      };
    }

    async function extractFrames(videoElem) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const times = [0, videoElem.duration * 0.5, videoElem.duration - 1];
      frames = [];
      for (let t of times) {
        if (t < 0) continue;
        await seekToTime(videoElem, t);
        canvas.width = videoElem.videoWidth;
        canvas.height = videoElem.videoHeight;
        ctx.drawImage(videoElem, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.8);
        frames.push(base64);
      }
    }

    function seekToTime(video, time) {
      return new Promise((resolve) => {
        video.currentTime = time;
        video.onseeked = () => resolve();
      });
    }

    // 分析按钮
    analyzeBtn.onclick = async () => {
      const title = titleInput.value.trim();
      const caption = document.getElementById('videoCaption').value.trim();
      const category = document.getElementById('videoCategory').value;

      if (!title) {
        titleErrorSpan.classList.remove('hidden');
        return;
      }

      const modal = document.getElementById('loadingModal');
      modal.classList.remove('hidden');

      try {
        const response = await fetch(`${BACKEND_URL}/api/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: activeToken,
            frames: frames,
            title: title,
            caption: caption,
            category: category,
            videoInfo: videoInfo
          })
        });
        const result = await response.json();
        if (result.success) {
          displayResults(result);
        } else {
          alert('分析失败：' + (result.message || '未知错误'));
        }
      } catch (err) {
        alert('网络错误，请重试');
      } finally {
        modal.classList.add('hidden');
      }
    };

    function displayResults(data) {
      const section = document.getElementById('analysisSection');
      section.classList.remove('hidden');

      // 总分
      document.getElementById('totalScore').innerText = data.score;

      // 雷达图
      const dims = data.dimensions || {
        content: 70, title: 70, quality: 70, compliance: 80, interaction: 70, rhythm: 70
      };
      if (radarChart) radarChart.destroy();
      const ctx = document.getElementById('radarChart').getContext('2d');
      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['内容吸引力', '标题热度', '画面质量', '合规性', '互动性', '节奏感'],
          datasets: [{
            data: [dims.content, dims.title, dims.quality, dims.compliance, dims.interaction, dims.rhythm],
            backgroundColor: 'rgba(22,119,255,0.2)',
            borderColor: '#1677FF',
            borderWidth: 2,
            pointBackgroundColor: '#1677FF'
          }]
        },
        options: { scales: { r: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
      });

      // 违规显示（如果有问题，但这里我们简单显示无违规，因为AI可能不直接返回违规标志）
      document.getElementById('violationNone').classList.remove('hidden');
      document.getElementById('violationExist').classList.add('hidden');

      // 问题分析
      const problemsDiv = document.getElementById('problemsContent');
      problemsDiv.innerHTML = (data.problems || []).map(p => `
        <div class="p-4 bg-gray-50 rounded-lg">
          <div class="flex items-start space-x-3">
            <div class="bg-warning bg-opacity-20 p-2 rounded-full"><i class="fa fa-lightbulb-o text-warning"></i></div>
            <div><h3 class="font-medium text-gray-800">${escapeHtml(p)}</h3></div>
          </div>
        </div>
      `).join('');

      // 优化建议
      const suggDiv = document.getElementById('suggestionsContent');
      suggDiv.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          ${(data.suggestions || []).map(s => `
            <div class="p-4 border border-gray-200 rounded-lg">
              <div class="flex items-center space-x-3 mb-3">
                <div class="bg-primary bg-opacity-10 p-2 rounded-full"><i class="fa fa-pencil text-primary"></i></div>
                <h3 class="font-medium text-gray-800">优化建议</h3>
              </div>
              <p class="text-sm text-gray-600">${escapeHtml(s)}</p>
            </div>
          `).join('')}
        </div>
        <div class="mt-6 p-4 bg-gray-50 rounded-lg">
          <h3 class="font-medium mb-2">📝 优化后的文案</h3>
          <p class="text-gray-700">${escapeHtml(data.newCaption || '')}</p>
          <h3 class="font-medium mt-4 mb-2">🎨 封面优化建议</h3>
          <p class="text-gray-700">${escapeHtml(data.coverAdvice || '')}</p>
        </div>
      `;

      // 新标题推荐（可显示在额外位置，但界面已有，这里可以追加）
      if (data.newTitles && data.newTitles.length) {
        const titleBlock = document.createElement('div');
        titleBlock.className = 'mt-6 p-4 bg-gray-50 rounded-lg';
        titleBlock.innerHTML = `<h3 class="font-medium mb-2">🏆 推荐标题</h3><ul class="list-disc pl-5">${data.newTitles.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ul>`;
        suggDiv.appendChild(titleBlock);
      }

      // 滚动到结果
      section.scrollIntoView({ behavior: 'smooth' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // 折叠/展开
    function toggleSection(sectionId, btnId) {
      const content = document.getElementById(sectionId);
      const btn = document.getElementById(btnId);
      btn.onclick = () => {
        content.classList.toggle('hidden');
        btn.innerHTML = content.classList.contains('hidden') ? '<span>展开</span><i class="fa fa-chevron-down"></i>' : '<span>收起</span><i class="fa fa-chevron-up"></i>';
      };
    }
    toggleSection('problemsContent', 'toggleProblems');
    toggleSection('suggestionsContent', 'toggleSuggestions');

    // 复制结果
    document.getElementById('copyResults').onclick = () => {
      const score = document.getElementById('totalScore').innerText;
      const problems = Array.from(document.querySelectorAll('#problemsContent .font-medium')).map(el => el.innerText).join('\n');
      const suggestions = Array.from(document.querySelectorAll('#suggestionsContent .text-gray-600')).map(el => el.innerText).join('\n');
      const text = `综合评分：${score}\n问题分析：\n${problems}\n优化建议：\n${suggestions}`;
      navigator.clipboard.writeText(text);
      alert('分析结果已复制到剪贴板');
    };

    // 模板数据（保留原豆包静态模板）
    const templateData = [
      { id:1, title:"15秒美食制作教程", category:"美食", image:"https://p11-doubao-search-sign.byteimg.com/pgc-image/7852877cde15470fa9a7a55d88026363~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1790585677&x-signature=bUiHimOB%2BYuQuX%2FcVMCcp6zEwsc%3D", views:"2.5M", likes:"450K", comments:"25K", highlights:["制作过程清晰","色彩鲜艳","讲解简洁"] },
      { id:2, title:"日常妆容快速上手", category:"美妆", image:"https://p26-doubao-search-sign.byteimg.com/isp-i18n-media/image/b65ad6b6fdc4d25a2dc575a201975241~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1790585677&x-signature=4LktqDMdezWEgnhPal1E%2BFRGRbk%3D", views:"1.8M", likes:"320K", comments:"18K", highlights:["步骤详细","适合新手","互动性强"] },

      { id:4, title:"创意美食摆盘技巧", category:"美食", image:"https://p11-doubao-search-sign.byteimg.com/labis/a0dae2339858736c0a7e87a588f23591~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1790585677&x-signature=Xs2pMDOg24ayh18T%2FApKPnCd%2BO4%3D", views:"1.5M", likes:"280K", comments:"15K", highlights:["色彩搭配","创意十足","简单易学"] }
    ];
    function renderTemplates() {
      const container = document.getElementById('templateContainer');
      container.innerHTML = templateData.map(t => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover cursor-pointer" data-category="${t.category}">
          <img src="${t.image}" class="w-full h-40 object-cover">
          <div class="p-4">
            <h3 class="font-medium text-gray-800">${t.title}</h3>
            <div class="flex items-center space-x-4 text-xs text-gray-500 mt-2">
              <span><i class="fa fa-eye"></i> ${t.views}</span>
              <span><i class="fa fa-heart"></i> ${t.likes}</span>
              <span><i class="fa fa-comment"></i> ${t.comments}</span>
            </div>
            <div class="flex flex-wrap gap-2 mt-2">${t.highlights.map(h => `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full">${h}</span>`).join('')}</div>
          </div>
        </div>
      `).join('');
    }
    renderTemplates();

    // 模板筛选
    document.querySelectorAll('.template-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.template-filter').forEach(b => b.classList.remove('active', 'bg-primary', 'text-white'));
        btn.classList.add('active', 'bg-primary', 'text-white');
        const category = btn.innerText;
        document.querySelectorAll('#templateContainer > div').forEach(card => {
          if (category === '全部' || card.dataset.category === category) card.style.display = 'block';
          else card.style.display = 'none';
        });
      });
    });
  </script>
