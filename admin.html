<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 视频诊断工具</title>
    <style>
        body { background: #0f172a; font-family: system-ui; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        input, button { padding: 8px 12px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #f1f5f9; padding: 16px; border-radius: 16px; flex:1; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #2563eb; }
        textarea { width: 100%; margin-top: 10px; padding: 8px; border-radius: 16px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔐 后台管理</h1>
        <input type="password" id="pwd" placeholder="管理员密码" style="width:200px;">
        <button id="login">登录</button>
    </div>
    <div id="adminPanel" style="display:none;"></div>
</div>
<script>
    const BACKEND = 'http://localhost:3000';
    document.getElementById('login').onclick = async () => {
        const pwd = document.getElementById('pwd').value;
        const res = await fetch(`${BACKEND}/api/admin/login`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ password: pwd })
        });
        const data = await res.json();
        if (data.success) {
            showAdmin(data.stats);
        } else {
            alert('密码错误');
        }
    };
    function showAdmin(stats) {
        const panel = document.getElementById('adminPanel');
        panel.style.display = 'block';
        panel.innerHTML = `
            <div class="card">
                <div class="stats">
                    <div class="stat-card"><div class="stat-number">${stats.total}</div>总激活码</div>
                    <div class="stat-card"><div class="stat-number">${stats.used}</div>已使用</div>
                    <div class="stat-card"><div class="stat-number">${stats.unused}</div>未使用</div>
                </div>
                <h3>激活码列表</h3>
                <table>
                    <thead><tr><th>激活码</th><th>状态</th><th>绑定设备ID</th><th>使用时间</th></tr></thead>
                    <tbody>
                        ${stats.codes.map(c => `
                            <tr>
                                <td>${c.code}</td>
                                <td>${c.used ? '已使用' : '未使用'}</td>
                                <td style="font-family:monospace;">${c.deviceId || '-'}</td>
                                <td>${c.usedTime || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <h3 style="margin-top:20px;">批量添加激活码</h3>
                <textarea id="newCodes" rows="4" placeholder="每行一个激活码&#10;VIP100&#10;VIP101"></textarea>
                <button id="addBtn">添加</button>
            </div>
        `;
        document.getElementById('addBtn').onclick = async () => {
            const codes = document.getElementById('newCodes').value.split('\n').map(l=>l.trim()).filter(l=>l);
            const pwd = document.getElementById('pwd').value;
            const res = await fetch(`${BACKEND}/api/admin/addcodes`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ password: pwd, newCodes: codes })
            });
            const result = await res.json();
            alert(`添加成功 ${result.added} 个`);
            location.reload();
        };
    }
</script>
</body>
</html>
